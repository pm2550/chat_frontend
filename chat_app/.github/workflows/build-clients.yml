name: Build signed clients

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Flutter build name, for example 1.0.0
        required: true
        default: 1.0.0
      version_code:
        description: Monotonic build number / versionCode
        required: true
        default: "10000"
      tag:
        description: GitHub release tag. Empty uses client-v<version_name>+<version_code>
        required: false
        default: ""
      release_notes:
        description: Release notes stored in GitHub Release and PM chat backend
        required: false
        default: PM chat signed client release
      publish_backend:
        description: Upload artifacts to PM chat backend app version channel
        type: boolean
        required: true
        default: false

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.41.6
  API_BASE_URL: https://gateway.chat.pm2550.com
  WS_BASE_URL: wss://gateway.chat.pm2550.com
  WEB_APP_URL: https://gateway.chat.pm2550.com
  WEBRTC_ICE_SERVERS: stun:stun.l.google.com:19302,turn:192.9.134.169:3478?transport=udp,turn:192.9.134.169:3478?transport=tcp

jobs:
  linux-android-web:
    name: Web, Android, Linux x64
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: ${{ github.event.inputs.version_name || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.version_code || '10000' }}
      RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'PM chat signed client release' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Require Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              exit 1
            fi
          done
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=release.keystore"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Linux flutter_sound plugin cache
        run: bash scripts/ci/patch_flutter_sound_linux.sh

      - name: Analyze and test
        run: |
          flutter analyze
          flutter test

      - name: Build Web
        run: |
          flutter build web --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=WEB_APP_URL="$WEB_APP_URL" \
            --dart-define=WEBRTC_ICE_SERVERS="$WEBRTC_ICE_SERVERS"
          (cd build/web && zip -qr "../../pm-chat-web-v${VERSION_NAME}+${VERSION_CODE}.zip" .)

      - name: Build signed Android APK and AAB
        run: |
          flutter build apk --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=WEB_APP_URL="$WEB_APP_URL" \
            --dart-define=WEBRTC_ICE_SERVERS="$WEBRTC_ICE_SERVERS"
          cp build/app/outputs/flutter-apk/app-release.apk "pm-chat-android-v${VERSION_NAME}+${VERSION_CODE}.apk"

          flutter build appbundle --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=WEB_APP_URL="$WEB_APP_URL" \
            --dart-define=WEBRTC_ICE_SERVERS="$WEBRTC_ICE_SERVERS"
          cp build/app/outputs/bundle/release/app-release.aab "pm-chat-android-v${VERSION_NAME}+${VERSION_CODE}.aab"

      - name: Build Linux x64
        run: |
          flutter build linux --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=WEB_APP_URL="$WEB_APP_URL" \
            --dart-define=WEBRTC_ICE_SERVERS="$WEBRTC_ICE_SERVERS"
          tar -C build/linux/x64/release -czf "pm-chat-linux-x64-v${VERSION_NAME}+${VERSION_CODE}.tar.gz" bundle

      - name: Upload Linux/Android/Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-android-web
          path: |
            pm-chat-web-v*.zip
            pm-chat-android-v*.apk
            pm-chat-android-v*.aab
            pm-chat-linux-x64-v*.tar.gz
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest
    env:
      VERSION_NAME: ${{ github.event.inputs.version_name || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.version_code || '10000' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Require Windows signing secrets
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) { throw "Missing GitHub secret: WINDOWS_CERTIFICATE_BASE64" }
          if (-not $env:WINDOWS_CERTIFICATE_PASSWORD) { throw "Missing GitHub secret: WINDOWS_CERTIFICATE_PASSWORD" }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\pmchat-windows.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))

      - name: Build Windows
        shell: pwsh
        run: |
          flutter pub get
          flutter build windows --release `
            --build-name "$env:VERSION_NAME" `
            --build-number "$env:VERSION_CODE" `
            --dart-define=API_BASE_URL="$env:API_BASE_URL" `
            --dart-define=WS_BASE_URL="$env:WS_BASE_URL" `
            --dart-define=WEB_APP_URL="$env:WEB_APP_URL" `
            --dart-define=WEBRTC_ICE_SERVERS="$env:WEBRTC_ICE_SERVERS"

      - name: Sign Windows binaries
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }

          $bundle = "build\windows\x64\runner\Release"
          Get-ChildItem $bundle -Recurse -Include *.exe,*.dll | ForEach-Object {
            & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "$env:RUNNER_TEMP\pmchat-windows.pfx" /p "$env:WINDOWS_CERTIFICATE_PASSWORD" $_.FullName
          }

      - name: Package Windows
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "pm-chat-windows-x64-v$env:VERSION_NAME+$env:VERSION_CODE.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: pm-chat-windows-x64-v*.zip
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    env:
      VERSION_NAME: ${{ github.event.inputs.version_name || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.version_code || '10000' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Require macOS signing secrets
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          for name in MACOS_CERTIFICATE_BASE64 MACOS_CERTIFICATE_PASSWORD MACOS_CODESIGN_IDENTITY MACOS_KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              exit 1
            fi
          done
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          printf '%s' "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/pmchat-macos.p12"
          security import "$RUNNER_TEMP/pmchat-macos.p12" -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

      - name: Build macOS
        run: |
          flutter pub get
          flutter build macos --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=WEB_APP_URL="$WEB_APP_URL" \
            --dart-define=WEBRTC_ICE_SERVERS="$WEBRTC_ICE_SERVERS"

      - name: Sign macOS app
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          app_path="build/macos/Build/Products/Release/PM chat.app"
          codesign --force --deep --options runtime --timestamp --sign "$MACOS_CODESIGN_IDENTITY" "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "pm-chat-macos-v${VERSION_NAME}+${VERSION_CODE}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: pm-chat-macos-v*.zip
          if-no-files-found: error

  ios:
    name: iOS IPA
    runs-on: macos-latest
    env:
      VERSION_NAME: ${{ github.event.inputs.version_name || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.version_code || '10000' }}
      IOS_EXPORT_METHOD: app-store
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Require iOS signing secrets
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in IOS_CERTIFICATE_BASE64 IOS_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE_BASE64 IOS_PROVISIONING_PROFILE_NAME APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              exit 1
            fi
          done

          security create-keychain -p ios-build build-ios.keychain
          security default-keychain -s build-ios.keychain
          security unlock-keychain -p ios-build build-ios.keychain
          printf '%s' "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/pmchat-ios.p12"
          security import "$RUNNER_TEMP/pmchat-ios.p12" -k build-ios.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ios-build build-ios.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/pmchat.mobileprovision"

          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.pm2550.chat</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Build signed iOS IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName PM chat" ios/Runner/Info.plist
          ruby -0777 -pi -e 'gsub(/CODE_SIGN_STYLE = Automatic;/, "CODE_SIGN_STYLE = Manual;"); gsub(/PRODUCT_BUNDLE_IDENTIFIER = com\.pm2550\.chat;/, "PRODUCT_BUNDLE_IDENTIFIER = com.pm2550.chat; DEVELOPMENT_TEAM = #{ENV.fetch(\"APPLE_TEAM_ID\")}; PROVISIONING_PROFILE_SPECIFIER = #{ENV.fetch(\"IOS_PROVISIONING_PROFILE_NAME\")}; CODE_SIGN_IDENTITY = \"Apple Distribution\";")' ios/Runner.xcodeproj/project.pbxproj
          flutter pub get
          flutter build ipa --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE" \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=WEB_APP_URL="$WEB_APP_URL" \
            --dart-define=WEBRTC_ICE_SERVERS="$WEBRTC_ICE_SERVERS"
          cp build/ios/ipa/*.ipa "pm-chat-ios-v${VERSION_NAME}+${VERSION_CODE}.ipa"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: pm-chat-ios-v*.ipa
          if-no-files-found: error

  release:
    name: GitHub Release and optional backend publish
    runs-on: ubuntu-latest
    needs:
      - linux-android-web
      - windows
      - macos
      - ios
    env:
      VERSION_NAME: ${{ github.event.inputs.version_name || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.version_code || '10000' }}
      RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'PM chat signed client release' }}
      INPUT_TAG: ${{ github.event.inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release tag
        id: meta
        run: |
          tag="$INPUT_TAG"
          if [ -z "$tag" ]; then
            tag="client-v${VERSION_NAME}+${VERSION_CODE}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "PM chat ${VERSION_NAME}+${VERSION_CODE}" \
              --notes "$RELEASE_NOTES"
          fi

      - name: Publish to PM chat backend
        if: ${{ github.event.inputs.publish_backend == 'true' }}
        env:
          PMCHAT_API_BASE_URL: ${{ secrets.PMCHAT_API_BASE_URL }}
          PMCHAT_ADMIN_USERNAME: ${{ secrets.PMCHAT_ADMIN_USERNAME }}
          PMCHAT_ADMIN_PASSWORD: ${{ secrets.PMCHAT_ADMIN_PASSWORD }}
        run: python3 scripts/ci/publish_app_versions.py dist
