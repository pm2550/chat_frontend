<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PM chat - 团队协作、AI 助手和工作区任务的一体化聊天入口。">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PM chat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PM chat</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f6f9fc;
      color: #101828;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #pm-boot {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08) 0 25%, transparent 25% 50%, rgba(20, 184, 166, 0.08) 50% 75%, transparent 75%) 0 0 / 28px 28px,
        radial-gradient(circle at 22% 24%, rgba(37, 99, 235, 0.12), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(20, 184, 166, 0.12), transparent 30%),
        #f6f9fc;
      z-index: 9999;
    }

    .pm-boot-panel {
      width: min(520px, calc(100vw - 48px));
      padding: 32px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
    }

    .pm-boot-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .pm-boot-mark {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2557d6, #14a89a);
      display: grid;
      place-items: center;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.24);
    }

    .pm-boot-mark::before {
      content: "";
      width: 24px;
      height: 18px;
      border-radius: 4px;
      background: #fff;
      box-shadow: -7px 9px 0 -5px #fff;
    }

    .pm-boot-copy {
      margin: 18px 0 24px;
      color: #475467;
      font-size: 15px;
      line-height: 1.6;
    }

    .pm-boot-progress {
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: #dbe7f5;
    }

    .pm-boot-progress::before {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb, #14b8a6);
      animation: pm-boot-slide 1.2s ease-in-out infinite;
    }

    @keyframes pm-boot-slide {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(280%); }
    }
  </style>
</head>
<body>
  <div id="pm-boot" role="status" aria-live="polite">
    <div class="pm-boot-panel">
      <div class="pm-boot-brand">
        <span class="pm-boot-mark" aria-hidden="true"></span>
        <span>PM chat</span>
      </div>
      <div class="pm-boot-copy">正在载入登录和工作区界面。若会话已过期，将自动回到登录页。</div>
      <div class="pm-boot-progress" aria-hidden="true"></div>
    </div>
  </div>
  <script>
    (function () {
      var originalFaviconHref = 'favicon.png';
      var faviconImage = new Image();
      var faviconReady = false;
      var pendingCount = 0;

      function ensureIconLink(type, href) {
        var icon = document.querySelector("link[rel~='icon']");
        if (!icon) {
          icon = document.createElement('link');
          icon.rel = 'icon';
          document.head.appendChild(icon);
        }
        icon.type = type;
        icon.href = href;
      }

      function drawBadge(count) {
        if (!faviconReady) {
          pendingCount = count;
          return;
        }
        if (!count || count <= 0) {
          ensureIconLink('image/png', originalFaviconHref);
          return;
        }
        var canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 64, 64);
        ctx.drawImage(faviconImage, 0, 0, 64, 64);
        var label = count > 99 ? '99+' : String(count);
        ctx.fillStyle = '#EF4444';
        ctx.beginPath();
        ctx.arc(46, 18, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '700 ' + (label.length > 2 ? 19 : 24) + 'px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, 46, 19);
        ensureIconLink('image/png', canvas.toDataURL('image/png'));
      }

      window.updateFaviconBadge = function (count) {
        drawBadge(Math.max(0, Number(count) || 0));
      };

      faviconImage.onload = function () {
        faviconReady = true;
        drawBadge(pendingCount);
      };
      faviconImage.src = originalFaviconHref;
    })();
  </script>
  <script>
    (function () {
      var fallbackBuildStamp = '__PMCHAT_BUILD_ID__';
      var recoveryGeneration = '20260712-stale-shell-rescue-p4';
      var currentBuildStamp = fallbackBuildStamp;
      var flutterLoadStarted = false;

      function dismissBoot() {
        var boot = document.getElementById('pm-boot');
        if (boot) boot.remove();
      }

      var observer = new MutationObserver(function () {
        if (document.querySelector('flt-glass-pane, flutter-view')) {
          dismissBoot();
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      function normalizeLocale(value) {
        if (typeof value !== 'string' || value.length === 0) return null;
        return value.replace(/_/g, '-').replace(/@.*$/, '');
      }

      var rawLanguages = Array.isArray(navigator.languages)
        ? navigator.languages
        : [navigator.language || navigator.userLanguage || 'en-US'];
      var normalizedLanguages = rawLanguages
        .map(normalizeLocale)
        .filter(Boolean);

      if (normalizedLanguages.length === 0) {
        normalizedLanguages = ['en-US'];
      }

      var changed = rawLanguages.length !== normalizedLanguages.length ||
        rawLanguages.some(function (value, index) {
          return value !== normalizedLanguages[index];
        });

      if (changed) {
        Object.defineProperty(navigator, 'languages', {
          configurable: true,
          get: function () { return normalizedLanguages.slice(); }
        });
        Object.defineProperty(navigator, 'language', {
          configurable: true,
          get: function () { return normalizedLanguages[0]; }
        });
      }

      function loadFlutter() {
        if (flutterLoadStarted) return;
        flutterLoadStarted = true;
        window.__PMCHAT_BUILD_STAMP = currentBuildStamp;
        var restoreServiceWorkerLookup = disableFlutterDeprecatedServiceWorker();
        var script = document.createElement('script');
        script.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(currentBuildStamp);
        script.async = true;
        script.addEventListener('load', function () {
          setTimeout(restoreServiceWorkerLookup, 0);
        });
        script.addEventListener('error', restoreServiceWorkerLookup);
        document.body.appendChild(script);
      }

      function disableFlutterDeprecatedServiceWorker() {
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker.getRegistration) {
          return function () {};
        }
        var originalGetRegistration = navigator.serviceWorker.getRegistration.bind(navigator.serviceWorker);
        navigator.serviceWorker.getRegistration = function () {
          return Promise.resolve(null);
        };
        return function () {
          navigator.serviceWorker.getRegistration = originalGetRegistration;
        };
      }

      function workerScriptUrl(registration) {
        var worker = registration.active || registration.waiting || registration.installing;
        return worker && worker.scriptURL ? worker.scriptURL : '';
      }

      function registerPmchatPushWorker() {
        if (!('serviceWorker' in navigator)) return Promise.resolve();
        return navigator.serviceWorker
          .register(pmchatWorkerUrl(currentBuildStamp), {
            scope: '/',
            updateViaCache: 'none'
          })
          .catch(function (error) {
            console.warn('Failed to register PM chat push worker:', error);
          });
      }

      function normalizeBuildStamp(value) {
        if (typeof value !== 'string') return fallbackBuildStamp;
        var normalized = value.trim().replace(/[^A-Za-z0-9._-]/g, '-');
        return normalized || fallbackBuildStamp;
      }

      function fetchBuildStamp() {
        return Promise.all([
          fetchBuildManifestStamp(),
          fetchAssetBuildStamp(),
          fetchBuildStampFile()
        ]).then(function (stamps) {
          return stamps[0] || stamps[2] || stamps[1] ||
            cachedAssetBuildStamp() || fallbackBuildStamp;
        });
      }

      function fetchBuildManifestStamp() {
        return fetchWithTimeout('/pmchat_build_manifest.json?ts=' + Date.now(), {
          cache: 'no-store',
          credentials: 'same-origin'
        }, 2500)
          .then(function (response) {
            if (!response.ok) throw new Error('build manifest unavailable');
            return response.json();
          })
          .then(function (manifest) {
            return normalizeBuildStamp(manifest && manifest.buildId || '');
          })
          .catch(function () { return ''; });
      }

      function fetchBuildStampFile() {
        return fetchWithTimeout('/.last_build_id?ts=' + Date.now(), {
          cache: 'no-store',
          credentials: 'same-origin'
        }, 2500)
          .then(function (response) {
            if (!response.ok) throw new Error('build stamp unavailable');
            return response.text();
          })
          .then(normalizeBuildStamp)
          .catch(function () {
            return '';
          });
      }

      function fetchAssetBuildStamp() {
        return fetchWithTimeout('/main.dart.js?stamp=' + Date.now(), {
          method: 'HEAD',
          cache: 'no-store',
          credentials: 'same-origin'
        }, 2500)
          .then(function (response) {
            if (!response.ok) throw new Error('main asset stamp unavailable');
            var stampParts = [
              response.headers.get('etag') || '',
              response.headers.get('last-modified') || '',
              response.headers.get('content-length') || ''
            ].filter(Boolean);
            return stampParts.length ? normalizeBuildStamp(stampParts.join('-')) : '';
          })
          .then(function (stamp) {
            if (stamp) rememberAssetBuildStamp(stamp);
            return stamp;
          })
          .catch(function () {
            return '';
          });
      }

      function cachedAssetBuildStamp() {
        try {
          var cached = localStorage.getItem('pmchat-last-asset-build-stamp');
          return cached ? normalizeBuildStamp(cached) : '';
        } catch (error) {
          return '';
        }
      }

      function rememberAssetBuildStamp(stamp) {
        try {
          localStorage.setItem('pmchat-last-asset-build-stamp', stamp);
        } catch (error) {
          // Storage can be unavailable in private/locked-down browsers.
        }
      }

      function fetchWithTimeout(url, options, timeoutMs) {
        if (typeof AbortController === 'undefined') {
          return Promise.race([
            fetch(url, options),
            delay(timeoutMs).then(function () {
              throw new Error('fetch timeout');
            })
          ]);
        }
        var controller = new AbortController();
        var timer = setTimeout(function () {
          controller.abort();
        }, timeoutMs);
        var requestOptions = Object.assign({}, options || {}, {
          signal: controller.signal
        });
        return fetch(url, requestOptions).finally(function () {
          clearTimeout(timer);
        });
      }

      function delay(timeoutMs) {
        return new Promise(function (resolve) {
          setTimeout(resolve, timeoutMs);
        });
      }

      function withTimeout(promise, timeoutMs, fallbackValue) {
        var settled = false;
        return Promise.race([
          promise.then(function (value) {
            settled = true;
            return value;
          }, function (error) {
            settled = true;
            throw error;
          }),
          delay(timeoutMs).then(function () {
            if (!settled) return fallbackValue;
            return fallbackValue;
          })
        ]);
      }

      function pmchatWorkerUrl(buildStamp) {
        return 'pmchat_service_worker.js?build=' +
          encodeURIComponent(buildStamp) +
          '&rescue=' + encodeURIComponent(recoveryGeneration);
      }

      function isCurrentPmchatWorker(scriptUrl, buildStamp) {
        return scriptUrl.indexOf('pmchat_service_worker.js') !== -1 &&
          scriptUrl.indexOf('build=' + encodeURIComponent(buildStamp)) !== -1;
      }

      function controlledPmchatBuildStamp() {
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) {
          return '';
        }
        var scriptUrl = navigator.serviceWorker.controller.scriptURL || '';
        if (scriptUrl.indexOf('pmchat_service_worker.js') === -1) return '';
        try {
          return normalizeBuildStamp(new URL(scriptUrl).searchParams.get('build') || '');
        } catch (error) {
          return '';
        }
      }

      function clearLegacyCaches() {
        if (!('caches' in window)) return Promise.resolve();
        return caches.keys()
          .then(function (keys) {
            return Promise.all(keys
              .filter(function (key) {
                return key.indexOf('flutter-app-cache') === 0 ||
                  key.indexOf('flutter-temp-cache') === 0 ||
                  key.indexOf('flutter-app-manifest') === 0;
              })
              .map(function (key) {
                return caches.delete(key);
              }));
          })
          .catch(function () {});
      }

      function waitForPmchatController(buildStamp) {
        if (!('serviceWorker' in navigator)) return Promise.resolve(false);
        if (navigator.serviceWorker.controller &&
            isCurrentPmchatWorker(navigator.serviceWorker.controller.scriptURL || '', buildStamp)) {
          return Promise.resolve(true);
        }
        return new Promise(function (resolve) {
          var settled = false;
          var timer = setTimeout(function () {
            if (!settled) {
              settled = true;
              resolve(false);
            }
          }, 5000);
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (settled) return;
            clearTimeout(timer);
            settled = true;
            resolve(!!navigator.serviceWorker.controller);
          }, { once: true });
        });
      }

      function recoveryUrl(buildStamp) {
        var url = new URL(window.location.href);
        url.searchParams.set('pmchat_recovered', buildStamp);
        return url.toString();
      }

      function reloadOnceForRecovery(buildStamp) {
        try {
          var key = 'pmchat-recovery-reload-' + buildStamp;
          var count = Number(sessionStorage.getItem(key) || '0');
          if (count >= 2) return { reloading: false, exhausted: true };
          sessionStorage.setItem(key, String(count + 1));
        } catch (error) {
          // sessionStorage can be unavailable in private contexts; still try one reload.
        }
        window.location.replace(recoveryUrl(buildStamp));
        return { reloading: true };
      }

      function preparePmchatServiceWorker(buildStamp) {
        if (!('serviceWorker' in navigator)) {
          return clearLegacyCaches()
            .then(function () { return { reloading: false }; });
        }
        var hadStaleWorker = false;
        return navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            registrations.forEach(function (registration) {
              var scriptUrl = workerScriptUrl(registration);
              if (scriptUrl && !isCurrentPmchatWorker(scriptUrl, buildStamp)) {
                hadStaleWorker = true;
              }
            });
          })
          .then(function () {
            return clearLegacyCaches();
          })
          .then(function () {
            return navigator.serviceWorker.register(pmchatWorkerUrl(buildStamp), {
              scope: '/',
              updateViaCache: 'none'
            });
          })
          .then(function () {
            return navigator.serviceWorker.ready.catch(function () {});
          })
          .then(function () {
            return waitForPmchatController(buildStamp);
          })
          .then(function (isControlledByCurrentWorker) {
            if (hadStaleWorker || !isControlledByCurrentWorker) {
              return reloadOnceForRecovery(buildStamp);
            }
            return { reloading: false };
          })
          .catch(function (error) {
            console.warn('PM chat service worker update failed; current complete release stays active:', error);
            return { reloading: false };
          });
      }

      function urlBase64ToUint8Array(base64String) {
        var padding = '='.repeat((4 - base64String.length % 4) % 4);
        var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        var rawData = atob(base64);
        var outputArray = new Uint8Array(rawData.length);
        for (var i = 0; i < rawData.length; ++i) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }

      function isStandalonePwa() {
        return window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true;
      }

      function isAppleStandalonePwa() {
        var ua = navigator.userAgent || '';
        var isiOS = /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        return isiOS && isStandalonePwa();
      }

      function shouldRunIosPwaHardReset() {
        if (!isAppleStandalonePwa()) return false;
        var url = new URL(window.location.href);
        if (url.searchParams.get('pmchat_ios_pwa_reset') === recoveryGeneration) {
          try {
            localStorage.setItem(
              'pmchat-ios-pwa-hard-reset-generation',
              recoveryGeneration
            );
          } catch (error) {
            // Storage may be unavailable; the URL marker is enough for this load.
          }
          return false;
        }
        try {
          return localStorage.getItem('pmchat-ios-pwa-hard-reset-generation') !==
            recoveryGeneration;
        } catch (error) {
          return true;
        }
      }

      function runIosPwaHardReset() {
        var resetTasks = [];
        if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
          resetTasks.push(
            navigator.serviceWorker.getRegistrations()
              .then(function (registrations) {
                return Promise.all(registrations.map(function (registration) {
                  return registration.unregister().catch(function () { return false; });
                }));
              })
              .catch(function () {})
          );
        }
        if ('caches' in window) {
          resetTasks.push(
            caches.keys()
              .then(function (keys) {
                return Promise.all(keys.map(function (key) {
                  return caches.delete(key);
                }));
              })
              .catch(function () {})
          );
        }

        Promise.race([
          Promise.all(resetTasks),
          delay(4500)
        ]).then(function () {
          try {
            localStorage.setItem(
              'pmchat-ios-pwa-hard-reset-generation',
              recoveryGeneration
            );
          } catch (error) {
            // The rescue URL marker still prevents reload loops.
          }
          var url = new URL(window.location.href);
          url.searchParams.set('pmchat_ios_pwa_reset', recoveryGeneration);
          url.searchParams.set('pmchat_ios_pwa_ts', Date.now().toString(36));
          window.location.replace(url.toString());
        }, function () {
          loadFlutter();
        });
      }

      function subscriptionPayload(subscription) {
        if (!subscription) return null;
        var json = subscription.toJSON ? subscription.toJSON() : {};
        return {
          ok: true,
          endpoint: json.endpoint || subscription.endpoint,
          keys: json.keys || {},
          userAgent: navigator.userAgent || '',
          standalone: isStandalonePwa(),
          permission: 'Notification' in window ? Notification.permission : 'unsupported'
        };
      }

      window.pmchatWebPush = {
        isSupported: function () {
          return 'serviceWorker' in navigator &&
            'PushManager' in window &&
            'Notification' in window;
        },
        isStandalone: isStandalonePwa,
        permission: function () {
          return 'Notification' in window ? Notification.permission : 'unsupported';
        },
        subscribe: function (vapidPublicKey) {
          if (!this.isSupported()) {
            return Promise.resolve({ ok: false, reason: 'unsupported' });
          }
          return registerPmchatPushWorker()
            .then(function () { return Notification.requestPermission(); })
            .then(function (permission) {
              if (permission !== 'granted') {
                return { ok: false, reason: 'permission_denied', permission: permission };
              }
              return navigator.serviceWorker.ready;
            })
            .then(function (registrationOrResult) {
              if (!registrationOrResult || registrationOrResult.ok === false) {
                return registrationOrResult || { ok: false, reason: 'service_worker_unavailable' };
              }
              return registrationOrResult.pushManager.getSubscription()
                .then(function (existing) {
                  if (existing) return existing;
                  return registrationOrResult.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
                  });
                })
                .then(subscriptionPayload);
            })
            .catch(function (error) {
              return { ok: false, reason: error && error.message ? error.message : 'subscribe_failed' };
            });
        },
        unsubscribe: function () {
          if (!this.isSupported()) {
            return Promise.resolve({ ok: false, reason: 'unsupported' });
          }
          return navigator.serviceWorker.ready
            .then(function (registration) { return registration.pushManager.getSubscription(); })
            .then(function (subscription) {
              if (!subscription) return { ok: true, endpoint: null };
              var payload = subscriptionPayload(subscription);
              return subscription.unsubscribe().then(function () {
                return payload || { ok: true, endpoint: null };
              });
            })
            .catch(function (error) {
              return { ok: false, reason: error && error.message ? error.message : 'unsubscribe_failed' };
            });
        }
      };
      window.pmchatWebPushIsSupported = function () {
        return window.pmchatWebPush.isSupported();
      };
      window.pmchatWebPushIsStandalone = function () {
        return window.pmchatWebPush.isStandalone();
      };
      window.pmchatWebPushPermission = function () {
        return window.pmchatWebPush.permission();
      };
      window.pmchatWebPushSubscribe = function (vapidPublicKey) {
        return window.pmchatWebPush.subscribe(vapidPublicKey);
      };
      window.pmchatWebPushUnsubscribe = function () {
        return window.pmchatWebPush.unsubscribe();
      };

      if (shouldRunIosPwaHardReset()) {
        runIosPwaHardReset();
        return;
      }

      setTimeout(function () {
        if (!flutterLoadStarted) {
          console.warn('PM chat bootstrap fallback: loading Flutter without waiting for service worker recovery.');
          loadFlutter();
        }
      }, 6000);

      var controlledBuildStamp = controlledPmchatBuildStamp();
      if (controlledBuildStamp) {
        // An active worker only claims clients after its complete release has
        // been cached. Start that coherent release immediately; update checks
        // continue in the background and may reload once after a full install.
        currentBuildStamp = controlledBuildStamp;
        loadFlutter();
        withTimeout(fetchBuildStamp(), 3500, controlledBuildStamp)
          .then(function (availableBuildStamp) {
            if (!availableBuildStamp || availableBuildStamp === controlledBuildStamp) {
              return;
            }
            currentBuildStamp = availableBuildStamp;
            return preparePmchatServiceWorker(availableBuildStamp);
          })
          .catch(function (error) {
            console.warn('PM chat background update check failed:', error);
          });
        return;
      }

      withTimeout(fetchBuildStamp(), 3500, cachedAssetBuildStamp() || fallbackBuildStamp)
        .then(function (buildStamp) {
          currentBuildStamp = buildStamp;
          return withTimeout(
            preparePmchatServiceWorker(buildStamp),
            3500,
            { reloading: false, timedOut: true }
          );
        })
        .then(function (result) {
          if (result && result.reloading) return;
          loadFlutter();
        }, loadFlutter);
    })();
  </script>
</body>
