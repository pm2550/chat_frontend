<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="990" viewBox="0 0 1400 990">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#183B83"/>
      <stop offset="0.55" stop-color="#2D6CDF"/>
      <stop offset="1" stop-color="#0FAE96"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="0.55" stop-color="#E8F2FF"/>
      <stop offset="1" stop-color="#E6F8F4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0B1F3A" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1 { font: 800 34px Inter, Arial, sans-serif; fill: #172033; }
      .h2 { font: 800 20px Inter, Arial, sans-serif; fill: #172033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #64748B; }
      .meta { font: 700 13px Inter, Arial, sans-serif; fill: #64748B; }
      .small { font: 700 12px Inter, Arial, sans-serif; fill: #94A3B8; }
      .card { fill: white; stroke: #EFF4F9; stroke-width: 1; filter: url(#shadow); }
      .soft { fill: #E8F2FF; }
      .mint { fill: #E6F8F4; }
      .coral { fill: #FFF0EA; }
      .primary { fill: #2D6CDF; }
      .secondary { fill: #0FAE96; }
      .accent { fill: #FF7A59; }
      .line { stroke: #DDE5EE; stroke-width: 1; }
    </style>
  </defs>
  <rect width="1400" height="990" fill="url(#bg)"/>
  <g opacity="0.35">
    <path d="M0 20 L980 1000" stroke="#DDE5EE" stroke-width="1"/>
    <path d="M40 0 L1030 990" stroke="#DDE5EE" stroke-width="1"/>
    <path d="M130 0 L1120 990" stroke="#DDE5EE" stroke-width="1"/>
    <path d="M220 0 L1210 990" stroke="#DDE5EE" stroke-width="1"/>
    <path d="M310 0 L1300 990" stroke="#DDE5EE" stroke-width="1"/>
    <path d="M400 0 L1390 990" stroke="#DDE5EE" stroke-width="1"/>
  </g>

  <rect x="70" y="58" width="56" height="56" rx="14" fill="url(#brand)"/>
  <circle cx="96" cy="82" r="6" fill="white"/>
  <circle cx="112" cy="82" r="6" fill="white"/>
  <circle cx="80" cy="82" r="6" fill="white"/>
  <path d="M82 101 L82 112 L96 101" fill="white"/>
  <text x="146" y="84" class="h1">PM chat Design System</text>
  <text x="146" y="110" class="body">P0 component catalog · cards, rows, states, attachments and controls</text>

  <rect x="70" y="160" width="380" height="170" rx="16" class="card"/>
  <text x="94" y="198" class="h2">PMCard</text>
  <text x="94" y="225" class="body">Unified elevated surface with 12px radius, border and hover feedback.</text>
  <rect x="94" y="252" width="132" height="44" rx="8" fill="#2D6CDF"/>
  <text x="125" y="280" style="font: 800 14px Inter, Arial; fill:white;">Primary</text>
  <rect x="238" y="252" width="132" height="44" rx="8" fill="white" stroke="#DDE5EE"/>
  <text x="266" y="280" style="font: 800 14px Inter, Arial; fill:#2D6CDF;">Secondary</text>

  <rect x="480" y="160" width="380" height="170" rx="16" class="card"/>
  <text x="504" y="198" class="h2">PMListRow</text>
  <circle cx="530" cy="250" r="24" fill="url(#brand)"/>
  <text x="519" y="258" style="font: 800 22px Inter, Arial; fill:white;">A</text>
  <text x="570" y="245" class="h2">Alex Chen</text>
  <text x="570" y="270" class="body">Workspace owner · online</text>
  <rect x="790" y="232" width="42" height="24" rx="12" fill="#2D6CDF"/>
  <text x="804" y="249" style="font: 800 12px Inter, Arial; fill:white;">12</text>

  <rect x="890" y="160" width="440" height="170" rx="16" class="card"/>
  <text x="914" y="198" class="h2">PMUserAvatar + PMStatusBadge</text>
  <circle cx="954" cy="258" r="34" fill="url(#brand)"/>
  <text x="939" y="269" style="font: 800 28px Inter, Arial; fill:white;">陆</text>
  <circle cx="980" cy="282" r="8" fill="#10B981" stroke="white" stroke-width="4"/>
  <rect x="1010" y="235" width="76" height="30" rx="15" fill="#E6F8F4" stroke="#BFEFE6"/>
  <circle cx="1027" cy="250" r="4" fill="#10B981"/>
  <text x="1038" y="255" class="meta" fill="#10B981">在线</text>
  <rect x="1100" y="235" width="76" height="30" rx="15" fill="#FFF7E6" stroke="#F8DAA0"/>
  <circle cx="1117" cy="250" r="4" fill="#F59E0B"/>
  <text x="1128" y="255" class="meta">离开</text>
  <rect x="1190" y="235" width="76" height="30" rx="15" fill="#FFF0EA" stroke="#FFD2C5"/>
  <circle cx="1207" cy="250" r="4" fill="#EF4444"/>
  <text x="1218" y="255" class="meta">忙碌</text>

  <rect x="70" y="360" width="380" height="240" rx="16" class="card"/>
  <text x="94" y="398" class="h2">PMSectionCard</text>
  <text x="94" y="423" class="body">Privacy &amp; account groups</text>
  <line x1="94" y1="448" x2="426" y2="448" class="line"/>
  <circle cx="116" cy="480" r="18" class="soft"/>
  <text x="146" y="475" class="meta">端到端加密</text>
  <text x="146" y="497" class="small">为新消息生成本地密钥</text>
  <rect x="366" y="466" width="44" height="24" rx="12" fill="#2D6CDF"/>
  <circle cx="398" cy="478" r="9" fill="white"/>
  <line x1="94" y1="520" x2="426" y2="520" class="line"/>
  <circle cx="116" cy="552" r="18" class="mint"/>
  <text x="146" y="547" class="meta">通知</text>
  <text x="146" y="569" class="small">桌面提醒和免打扰</text>

  <rect x="480" y="360" width="380" height="240" rx="16" class="card"/>
  <text x="504" y="398" class="h2">PMEmptyState / PMErrorState</text>
  <rect x="630" y="430" width="78" height="78" rx="18" class="mint"/>
  <path d="M650 475 H690 M650 455 H690 M650 455 V488 H690 V455" stroke="#047A6F" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="540" class="h2">暂无文件</text>
  <text x="552" y="566" class="body">上传第一份资料后会显示在这里。</text>

  <rect x="890" y="360" width="440" height="240" rx="16" class="card"/>
  <text x="914" y="398" class="h2">PMSkeleton + PMProgressStrip</text>
  <rect x="914" y="432" width="360" height="18" rx="9" fill="#EAF0F7"/>
  <rect x="914" y="462" width="280" height="18" rx="9" fill="#EAF0F7"/>
  <rect x="914" y="500" width="360" height="54" rx="12" fill="#EAF0F7"/>
  <rect x="914" y="570" width="360" height="6" rx="3" fill="#DDE5EE"/>
  <rect x="914" y="570" width="210" height="6" rx="3" fill="#2D6CDF"/>

  <rect x="70" y="630" width="380" height="230" rx="16" class="card"/>
  <text x="94" y="668" class="h2">PMAttachmentCard</text>
  <rect x="94" y="698" width="332" height="82" rx="12" fill="#F7FAFC" stroke="#EFF4F9"/>
  <rect x="112" y="717" width="44" height="44" rx="12" class="soft"/>
  <path d="M125 750 L143 728 L153 742 L158 736" stroke="#2D6CDF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="174" y="737" class="meta">design-system.png</text>
  <text x="174" y="760" class="small">1.8 MB · 图片</text>
  <rect x="94" y="798" width="332" height="8" rx="4" fill="#DDE5EE"/>
  <rect x="94" y="798" width="224" height="8" rx="4" fill="#0FAE96"/>

  <rect x="480" y="630" width="380" height="230" rx="16" class="card"/>
  <text x="504" y="668" class="h2">PMDialogHeader</text>
  <rect x="650" y="696" width="52" height="5" rx="3" fill="#DDE5EE"/>
  <text x="540" y="740" class="h2">成员权限</text>
  <text x="540" y="766" class="body">管理谁可以查看或编辑当前文件夹。</text>
  <circle cx="790" cy="732" r="18" fill="#F7FAFC" stroke="#DDE5EE"/>
  <path d="M784 726 L796 738 M796 726 L784 738" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>

  <rect x="890" y="630" width="440" height="230" rx="16" class="card"/>
  <text x="914" y="668" class="h2">PMChip</text>
  <rect x="914" y="705" width="70" height="36" rx="18" fill="#E8F2FF" stroke="#B8D4FF"/>
  <text x="938" y="728" class="meta" fill="#2D6CDF">全部</text>
  <rect x="998" y="705" width="82" height="36" rx="18" fill="white" stroke="#DDE5EE"/>
  <text x="1024" y="728" class="meta">图片</text>
  <rect x="1094" y="705" width="82" height="36" rx="18" fill="white" stroke="#DDE5EE"/>
  <text x="1120" y="728" class="meta">文档</text>
  <rect x="914" y="770" width="142" height="44" rx="8" fill="#2D6CDF"/>
  <text x="954" y="798" style="font: 800 14px Inter, Arial; fill:white;">保存</text>
  <rect x="1070" y="770" width="142" height="44" rx="8" fill="white" stroke="#EF4444" stroke-opacity="0.35"/>
  <text x="1110" y="798" style="font: 800 14px Inter, Arial; fill:#EF4444;">删除</text>

  <text x="70" y="930" class="body">All components are Flutter widgets under lib/design/. Use this catalog as the visual baseline before P1 page rewrites.</text>
</svg>
