# nginx site config for the chat web frontend + backend reverse proxy.
#
# Drop into /etc/nginx/sites-enabled/chat.conf and adjust:
#   - server_name to your domain
#   - SSL cert paths (mandatory for production: PWA + secure cookies + WSS)
#   - root path to where you copied flutter build/web/
#   - upstream backend host:port if not localhost:18080
#
# Build the web bundle with the matching public origin:
#   flutter build web --release \
#     --no-web-resources-cdn \
#     --dart-define=API_BASE_URL=https://chat.example.com \
#     --dart-define=WS_BASE_URL=wss://chat.example.com

upstream chatapp_backend {
    server 127.0.0.1:18080 fail_timeout=0;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.example.com;

    # TLS - replace with your real certs (e.g. certbot)
    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Static SPA bundle from flutter build web/
    root /var/www/chat/web;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        application/xml
        image/svg+xml;

    # SPA fallback. Keep HTML mutable so the app can discover new versions.
    location / {
        try_files $uri $uri/ /index.html;
        expires off;
        add_header Cache-Control "no-cache" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self)" always;
    }

    location = /index.html {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self)" always;
    }

    location = /pmchat_service_worker.js {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache" always;
    }

    location = /flutter_service_worker.js {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache" always;
    }

    location = /flutter_bootstrap.js {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache" always;
    }

    location = /main.dart.js {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /manifest.json {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache" always;
    }

    location = /version.json {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache" always;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /canvaskit/ {
        try_files $uri =404;
        types {
            application/javascript js;
            application/wasm wasm;
        }
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /fonts/ {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /icons/ {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Long-cache immutable app shell and asset files.
    location ~* \.wasm$ {
        try_files $uri =404;
        types {
            application/wasm wasm;
        }
        default_type application/wasm;
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|otf|ttf)$ {
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self)" always;

    # API
    location /api/ {
        proxy_pass http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket - same upstream, with the upgrade dance
    location /api/ws {
        proxy_pass http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Actuator health is ok to expose; everything else under /actuator should be auth-gated.
    location = /actuator/health {
        proxy_pass http://chatapp_backend;
    }
    location /actuator/ {
        return 403;
    }

    client_max_body_size 100M;
}
